project:
  type: book
  output-dir: GUIDEBOOK
  # Pre-rendered quality reports are produced by R/07_render_report.R; the
  # book just copies them through to the site so GH Pages can serve them.
  resources:
    - quality-reports/**

book:
  title: "CORE Data Pipeline Guide"
  output-file: "core-pipeline-guide"
  author:
    - "Thiyaghessan"
  date: last-modified
  sidebar:
    style: "docked"
    background: "#1696d2"
  chapters:
    - index.qmd
    - 01-architecture.qmd
    - 02-data-lineage.qmd
    - 03-transforms-reference.qmd
    - 04-crosswalks.qmd
    - 05-quality-gates.qmd
    - 06-configuration.qmd
    - 07-developer-guide.qmd
    - 08-output-schema.qmd
    - 09-legacy-harmonization.qmd
    - 10-ec2-batch-processing.qmd
    - 11-upstream-source-quirks.qmd
    - 12-quality-reports.qmd

format:
  html:
    theme: cosmo
    highlight-style: github
    css: style.css
    mermaid:
      theme: default
      themeVariables:
        primaryColor: "#1696d2"
        primaryTextColor: "#ffffff"
        primaryBorderColor: "#0a4c6a"
        secondaryColor: "#fdbf11"
        secondaryTextColor: "#000000"
        secondaryBorderColor: "#d69600"
        tertiaryColor: "#d2d2d2"
        tertiaryTextColor: "#353535"
        tertiaryBorderColor: "#9e9e9e"
        lineColor: "#696969"
        textColor: "#353535"
        fontFamily: "system-ui, -apple-system, sans-serif"
        fontSize: "14px"
    grid:
      sidebar-width: 225px
      body-width: 900px
      margin-width: 400px
      gutter-width: 100px

editor: visual
