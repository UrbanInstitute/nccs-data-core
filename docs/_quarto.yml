project:
  type: book
  output-dir: GUIDEBOOK

book:
  title: "BMF Data Pipeline Guide"
  output-file: "bmf-pipeline-guide"
  author:
    - "Jesse Lecy"
    - "Thiyaghessan"
  date: last-modified
  sidebar:
    style: "docked"
    background: "#1696d2"
  chapters:
    - index.qmd
    - 01-architecture.qmd
    - 02-data-lineage.qmd
    - 03-transforms-reference.qmd
    - 04-dimension-tables.qmd
    - 05-quality-gates.qmd
    - 06-configuration.qmd
    - 07-developer-guide.qmd
    - 08-lookup-tables.qmd
    - 09-legacy-harmonization.qmd
    - 10-ec2-batch-processing.qmd
    - 11-master-bmf.qmd

format:
  html:
    theme: cosmo
    highlight-style: github
    css: style.css
    mermaid:
      theme: default
      themeVariables:
        primaryColor: "#1696d2"
        primaryTextColor: "#ffffff"
        primaryBorderColor: "#0a4c6a"
        secondaryColor: "#fdbf11"
        secondaryTextColor: "#000000"
        secondaryBorderColor: "#d69600"
        tertiaryColor: "#d2d2d2"
        tertiaryTextColor: "#353535"
        tertiaryBorderColor: "#9e9e9e"
        lineColor: "#696969"
        textColor: "#353535"
        fontFamily: "system-ui, -apple-system, sans-serif"
        fontSize: "14px"
    grid:
      sidebar-width: 225px
      body-width: 900px
      margin-width: 400px
      gutter-width: 100px

editor: visual
